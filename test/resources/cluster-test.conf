# Test configuration for pekko-cluster
# Single-node cluster for testing

pekko {
  actor {
    provider = cluster
    allow-java-serialization = on
    warn-about-java-serializer-usage = off
  }

  remote.artery {
    canonical.hostname = "127.0.0.1"
    canonical.port = 0  # Use random port for tests
  }

  cluster {
    seed-nodes = []  # Will self-join

    # Use split-brain resolver
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"

    # Faster settings for tests
    failure-detector {
      acceptable-heartbeat-pause = 3s
    }

    # Sharding settings for tests
    sharding {
      number-of-shards = 10
      passivate-idle-entity-after = off
      remember-entities = off

      # Use in-memory state store for tests
      state-store-mode = ddata
    }
  }

  # Persistence for sharding remember-entities
  persistence {
    journal.plugin = "pekko.persistence.journal.inmem"
    snapshot-store.plugin = "pekko.persistence.snapshot-store.local"
    snapshot-store.local.dir = "target/test-snapshots"
  }

  loglevel = "WARNING"
  stdout-loglevel = "WARNING"
}
