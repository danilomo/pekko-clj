# Test configuration for pekko-persistence
# Uses LevelDB for persistence (supports recovery across restarts)

pekko {
  actor {
    # Enable Java serialization for tests (Clojure data structures)
    allow-java-serialization = on
    warn-about-java-serializer-usage = off
  }

  persistence {
    journal {
      plugin = "pekko.persistence.journal.leveldb"
      leveldb {
        dir = "target/journal"
        native = false
      }
    }
    snapshot-store {
      plugin = "pekko.persistence.snapshot-store.local"
      local {
        dir = "target/snapshots"
      }
    }
  }

  # Reduce log noise in tests
  loglevel = "WARNING"
  stdout-loglevel = "WARNING"
}
